version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.17.1
        - pnpm config set minimumReleaseAge 0
        - pnpm install
    build:
      commands:
        - pnpm run build
  cache:
    paths:
      - node_modules/.cache/**/*
      - .next/cache/**/*
      - node_modules/**/*
