version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack install
        - pnpm config set minimumReleaseAge 0
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  cache:
    paths:
      - node_modules/.cache/**/*
      - .next/cache/**/*
      - node_modules/**/*
