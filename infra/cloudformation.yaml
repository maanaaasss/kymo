AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kymo AWS Infrastructure - DynamoDB, S3, SQS for download worker'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name

Resources:
  # ─── DynamoDB Tables ─────────────────────────────────────────────────────

  BatchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kymo-batches-${Environment}'
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kymo-jobs-${Environment}'
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: batchId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: batchId-index
          KeySchema:
            - AttributeName: batchId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  DownloadHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kymo-download-history-${Environment}'
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: videoId
          AttributeType: S
        - AttributeName: kind
          AttributeType: S
      KeySchema:
        - AttributeName: videoId
          KeyType: HASH
        - AttributeName: kind
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'kymo-idempotency-${Environment}'
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ─── S3 Bucket ───────────────────────────────────────────────────────────

  OutputsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'kymo-outputs-${Environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: CleanupTmpFiles
            Prefix: tmp/
            Status: Enabled
            ExpirationInDays: 1
          - Id: CleanupFailedOutputs
            Prefix: outputs/
            Status: Enabled
            ExpirationInDays: 3
          - Id: AbortIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  # ─── SQS Queues ──────────────────────────────────────────────────────────

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'kymo-downloads-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days

  DownloadQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'kymo-downloads-${Environment}'
      VisibilityTimeout: 900  # 15 minutes (must be > Lambda timeout)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 2

  # ─── Lambda Execution Role ───────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'kymo-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KymoWorkerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BatchesTable.Arn
                  - !GetAtt JobsTable.Arn
                  - !Sub '${JobsTable.Arn}/index/*'
                  - !GetAtt DownloadHistoryTable.Arn
                  - !GetAtt IdempotencyTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${OutputsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt DownloadQueue.Arn

Outputs:
  BatchesTableName:
    Value: !Ref BatchesTable
  JobsTableName:
    Value: !Ref JobsTable
  DownloadHistoryTableName:
    Value: !Ref DownloadHistoryTable
  IdempotencyTableName:
    Value: !Ref IdempotencyTable
  OutputsBucketName:
    Value: !Ref OutputsBucket
  DownloadQueueUrl:
    Value: !Ref DownloadQueue
  DeadLetterQueueUrl:
    Value: !Ref DeadLetterQueue
  LambdaExecutionRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
